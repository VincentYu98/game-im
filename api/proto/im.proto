syntax = "proto3";
package im.v1;
option go_package = "game-im/api/pb";

// ─── Enums ──────────────────────────────────────────────

enum ChannelType {
  CHANNEL_TYPE_UNSPECIFIED = 0;
  CHANNEL_TYPE_WORLD       = 1;
  CHANNEL_TYPE_ALLIANCE    = 2;
  CHANNEL_TYPE_ACTIVITY    = 3;
  CHANNEL_TYPE_PRIVATE     = 4;
  CHANNEL_TYPE_SYSTEM      = 5;
}

enum MsgType {
  MSG_TYPE_UNSPECIFIED = 0;
  MSG_TYPE_TEXT        = 1;
  MSG_TYPE_IMAGE       = 2;
  MSG_TYPE_EMOJI       = 3;
  MSG_TYPE_SYSTEM      = 4;
  MSG_TYPE_LINK        = 5;
}

// ─── Core Types ─────────────────────────────────────────

message SenderInfo {
  int64  sender_id         = 1;
  string sender_name       = 2;
  string sender_head_image = 3;
  int32  sender_rank       = 4;
  string alliance_name     = 5;
}

message ImMessage {
  int64       msg_id        = 1;  // Server-assigned, per-channel monotonic
  string      channel_id    = 2;
  ChannelType channel_type  = 3;
  SenderInfo  sender        = 4;
  string      content       = 5;
  MsgType     msg_type      = 6;
  repeated string msg_param = 7;  // Template vars for SYSTEM messages
  int64       send_time     = 8;  // Server receive time, unix ms
  string      client_msg_id = 9;  // Client-generated UUID for idempotency
}

// ─── Client → Server ────────────────────────────────────

message AuthReq {
  string token   = 1;
  string version = 2;
  // Per-channel last seen msg_id for reconnect gap detection
  map<string, int64> channel_last_msg_ids = 3;
}

message AuthResp {
  int32  code        = 1;
  string msg         = 2;
  int64  uid         = 3;
  int64  server_time = 4;
}

message SendMsgReq {
  string      channel_id    = 1;
  ChannelType channel_type  = 2;
  string      content       = 3;
  MsgType     msg_type      = 4;
  repeated string msg_param = 5;
  string      client_msg_id = 6;
}

message SendMsgResp {
  int32  code      = 1;
  string msg       = 2;
  int64  msg_id    = 3;
  int64  send_time = 4;
}

message PullMsgReq {
  string channel_id  = 1;
  int64  last_msg_id = 2;
  int32  limit       = 3;  // max 50
}

message PullMsgResp {
  int32              code     = 1;
  string             msg      = 2;
  repeated ImMessage messages = 3;
}

message AckMsgReq {
  string channel_id = 1;
  int64  msg_id     = 2;
}

message HeartbeatReq {
  int64 timestamp = 1;
}

message HeartbeatResp {
  int64 server_time = 1;
}

// ─── Server → Client Push ───────────────────────────────

message PushNewMessage {
  ImMessage message = 1;
}

// Lightweight notification for world/system channels.
// Client should call PullMsg if chat UI is open.
message WorldNotify {
  string channel_id = 1;
  int64  latest_seq = 2;  // latest msg_id in this channel
}
